name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore EcoTelemetry.csproj

      - name: Build
        run: dotnet build EcoTelemetry.csproj -c Release --no-restore

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: EcoTelemetry-build
          path: bin/Release/net10.0/
          if-no-files-found: error
