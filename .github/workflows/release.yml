name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build EcoTelemetry.csproj -c Release

      - name: Stage release artifact
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          stage="staging/EcoTelemetry"
          mkdir -p "$stage"
          cp -r bin/Release/net10.0/. "$stage/"
          cp Configs/EcoTelemetry.example.json "$stage/"
          cp README.md LICENSE "$stage/"
          (cd staging && zip -r "../EcoTelemetry-${version}.zip" EcoTelemetry)
          ls -la "EcoTelemetry-${version}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: EcoTelemetry-*.zip
          generate_release_notes: true
