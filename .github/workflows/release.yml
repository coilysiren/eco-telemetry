name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build EcoTelemetry.csproj -c Release

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          version="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Stage release artifact
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          stage="staging/EcoTelemetry"
          mkdir -p "$stage"
          cp -r bin/Release/net10.0/. "$stage/"
          cp Configs/EcoTelemetry.example.json "$stage/"
          cp README.md LICENSE "$stage/"
          (cd staging && zip -r "../EcoTelemetry-${VERSION}.zip" EcoTelemetry)
          ls -la "EcoTelemetry-${VERSION}.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: EcoTelemetry-*.zip
          generate_release_notes: true
